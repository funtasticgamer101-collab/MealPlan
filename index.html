<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Comfort Meals</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#f97316">
    <link rel="apple-touch-icon" href="https://ui-avatars.com/api/?name=CM&background=f97316&color=fff&size=192">
  </head>
  <body class="bg-orange-50/30 text-gray-900 antialiased selection:bg-orange-200 selection:text-orange-900">
    <div id="root"></div>
    <script>
      window.onerror = function(msg, url, line, col, error) {
        console.error("Global error caught: ", msg, url, line, col, error);
        // If the root is still empty after a few seconds, show a fallback message
        setTimeout(() => {
          const root = document.getElementById('root');
          if (root && root.innerHTML === '') {
            root.innerHTML = '<div style="padding: 20px; text-align: center; color: #f97316;">' +
              '<h2>Something went wrong loading the app.</h2>' +
              '<p>Please try clearing your browser cache or doing a hard refresh (Ctrl+F5).</p>' +
              '<p style="font-size: 10px; color: #999;">Error: ' + msg + '</p>' +
              '</div>';
          }
        }, 3000);
        return false;
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js').then(registration => {
            console.log('SW registered: ', registration);
          }).catch(registrationError => {
            console.log('SW registration failed: ', registrationError);
          });
        });
      }
    </script>
  </body>
</html>
