<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Comfort Meals</title>
    <link rel="manifest" href="%BASE_URL%manifest.json">
    <meta name="theme-color" content="#f97316">
    <link rel="apple-touch-icon" href="https://ui-avatars.com/api/?name=CM&background=f97316&color=fff&size=192">
  </head>
  <body class="bg-orange-50/30 text-gray-900 antialiased selection:bg-orange-200 selection:text-orange-900">
    <div id="root"></div>
    <script>
      // Aggressive cache busting script
      const APP_VERSION = 'v4'; // Increment this to force a hard refresh for all users
      const currentVersion = localStorage.getItem('app_version');
      
      if (currentVersion !== APP_VERSION) {
        console.log('New version detected! Clearing caches...');
        
        // 1. Unregister all service workers
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            for(let registration of registrations) {
              registration.unregister();
            }
          });
        }
        
        // 2. Clear all Cache Storage
        if ('caches' in window) {
          caches.keys().then(function(names) {
            for (let name of names) {
              caches.delete(name);
            }
          });
        }
        
        // 3. Update version and reload
        localStorage.setItem('app_version', APP_VERSION);
        window.location.reload(true);
      }
      
      window.onerror = function(msg, url, line, col, error) {
        console.error("Global error caught: ", msg, url, line, col, error);
        showFallbackError(msg);
        return false;
      };

      window.addEventListener('unhandledrejection', function(event) {
        console.error("Unhandled promise rejection: ", event.reason);
        showFallbackError(event.reason);
      });

      function showFallbackError(msg) {
        setTimeout(() => {
          const root = document.getElementById('root');
          if (root && root.innerHTML === '') {
            root.innerHTML = '<div style="padding: 20px; text-align: center; color: #f97316;">' +
              '<h2>Something went wrong loading the app.</h2>' +
              '<p>Please try clearing your browser cache or doing a hard refresh (Ctrl+F5).</p>' +
              '<p style="font-size: 10px; color: #999; word-break: break-all;">Error: ' + msg + '</p>' +
              '</div>';
          }
        }, 3000);
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // Append timestamp to force browser to fetch latest sw.js
          const swUrl = '%BASE_URL%sw.js?v=' + new Date().getTime();
          navigator.serviceWorker.register(swUrl).then(registration => {
            console.log('SW registered: ', registration);
          }).catch(registrationError => {
            console.log('SW registration failed: ', registrationError);
          });
        });
      }
    </script>
  </body>
</html>
