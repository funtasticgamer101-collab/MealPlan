<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Comfort Meals</title>
    <link rel="manifest" href="%BASE_URL%manifest.json">
    <meta name="theme-color" content="#f97316">
  </head>
  <body class="bg-orange-50/30 text-gray-900 antialiased selection:bg-orange-200 selection:text-orange-900">
    <div id="root"></div>
    <script>
      // Aggressive cache busting script
      const APP_VERSION = 'v7'; // Increment this to force a hard refresh for all users
      let currentVersion = null;
      let storageAvailable = false;
      
      try {
        currentVersion = localStorage.getItem('app_version');
        storageAvailable = true;
      } catch (e) {
        console.warn('localStorage access denied in index.html');
      }
      
      // Only run cache busting if storage is available, to prevent infinite reload loops
      // when cookies/storage are blocked (e.g., in some Incognito modes)
      if (storageAvailable && currentVersion !== APP_VERSION) {
        console.log('New version detected! Clearing caches...');
        
        // 1. Unregister all service workers
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            for(let registration of registrations) {
              registration.unregister();
            }
          });
        }
        
        // 2. Clear all Cache Storage
        if ('caches' in window) {
          caches.keys().then(function(names) {
            for (let name of names) {
              caches.delete(name);
            }
          });
        }
        
        // 3. Update version and reload
        try {
          localStorage.setItem('app_version', APP_VERSION);
          window.location.reload(true);
        } catch (e) {
          console.warn('Failed to set app_version, skipping reload to prevent loop');
        }
      }
      
      window.onerror = function(msg, url, line, col, error) {
        console.error("Global error caught: ", msg, url, line, col, error);
        showFallbackError(msg);
        return false;
      };

      window.addEventListener('unhandledrejection', function(event) {
        console.error("Unhandled promise rejection: ", event.reason);
        showFallbackError(event.reason);
      });

      // Catch resource loading errors (e.g., 404 on JS/CSS files)
      window.addEventListener('error', function(e) {
        if (e.target && (e.target.tagName === 'SCRIPT' || e.target.tagName === 'LINK')) {
          const url = e.target.src || e.target.href;
          // Only trigger for critical JS/CSS files, ignore external images/icons
          if (url && (url.includes('.js') || url.includes('.css'))) {
            console.error("Resource failed to load: ", url);
            showFallbackError("Failed to load resource: " + url);
          }
        }
      }, true);

      // Ultimate failsafe: if the app hasn't rendered anything after 3 seconds, show an error.
      setTimeout(() => {
        const root = document.getElementById('root');
        if (root && root.innerHTML.trim() === '') {
          showFallbackError("The app failed to start. This might be due to a cached broken version or blocked storage.");
        }
      }, 3000);

      function showFallbackError(msg) {
        const root = document.getElementById('root');
        if (root && root.innerHTML.trim() === '') {
          root.innerHTML = '<div style="padding: 20px; text-align: center; color: #f97316; font-family: sans-serif; max-width: 400px; margin: 40px auto; background: #fff3ed; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">' +
            '<h2 style="margin-top: 0;">App Failed to Load</h2>' +
            '<p style="color: #666; font-size: 14px;">Something went wrong while starting the app.</p>' +
            '<p style="font-size: 11px; color: #dc2626; word-break: break-all; background: #fee2e2; padding: 8px; border-radius: 4px;">Error: ' + msg + '</p>' +
            '<button onclick="forceClearAndReload()" style="margin-top: 20px; padding: 12px 24px; background-color: #f97316; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%;">Clear Cache & Reload</button>' +
            '</div>';
        }
      }

      window.forceClearAndReload = function() {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            for(let registration of registrations) {
              registration.unregister();
            }
          });
        }
        if ('caches' in window) {
          caches.keys().then(function(names) {
            for (let name of names) {
              caches.delete(name);
            }
          });
        }
        try {
          localStorage.clear();
          sessionStorage.clear();
        } catch(e) {}
        
        setTimeout(() => {
          window.location.reload(true);
        }, 500);
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // Append timestamp to force browser to fetch latest sw.js
          const swUrl = '%BASE_URL%sw.js?v=' + new Date().getTime();
          navigator.serviceWorker.register(swUrl).then(registration => {
            console.log('SW registered: ', registration);
          }).catch(registrationError => {
            console.log('SW registration failed: ', registrationError);
          });
        });
      }
    </script>
  </body>
</html>
