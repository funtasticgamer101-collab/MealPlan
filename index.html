<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Comfort Meals</title>
    <link rel="manifest" href="%BASE_URL%manifest.json">
    <meta name="theme-color" content="#f97316">
  </head>
  <body class="bg-orange-50/30 text-gray-900 antialiased selection:bg-orange-200 selection:text-orange-900">
    <div id="root"></div>
    <script>
      // Storage-Independent Cache Busting
      const APP_VERSION = 'v9';
      const debugLog = [];
      
      // 1. Always unregister SW
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.unregister();
          }
        });
      }
      
      // 2. Always clear Cache Storage
      if ('caches' in window) {
        caches.keys().then(function(names) {
          for (let name of names) {
            caches.delete(name);
          }
        });
      }
      
      // 3. Force reload using URL param to bypass HTTP cache
      if (window.location.search.indexOf('v=' + APP_VERSION) === -1) {
        let newUrl = window.location.protocol + '//' + window.location.host + window.location.pathname;
        if (window.location.search) {
          newUrl += window.location.search + '&v=' + APP_VERSION;
        } else {
          newUrl += '?v=' + APP_VERSION;
        }
        window.location.replace(newUrl);
      }
      
      window.onerror = function(msg, url, line, col, error) {
        debugLog.push(`[Global] ${msg} @ ${url}:${line}`);
        showFallbackError(debugLog.join(" || "));
        return false;
      };

      window.addEventListener('unhandledrejection', function(event) {
        debugLog.push(`[Promise] ${event.reason}`);
        showFallbackError(debugLog.join(" || "));
      });

      // Catch resource loading errors (e.g., 404 on JS/CSS files)
      window.addEventListener('error', function(e) {
        if (e.target && (e.target.tagName === 'SCRIPT' || e.target.tagName === 'LINK')) {
          const url = e.target.src || e.target.href;
          // Only trigger for critical JS/CSS files, ignore external images/icons
          if (url && (url.includes('.js') || url.includes('.css') || url.includes('.tsx'))) {
            debugLog.push(`[Resource 404] Failed to load: ${url}`);
            showFallbackError(debugLog.join(" || "));
          }
        }
      }, true);

      // Ultimate failsafe: if the app hasn't rendered anything after 3 seconds, show an error.
      setTimeout(() => {
        const root = document.getElementById('root');
        if (root && root.innerHTML.trim() === '') {
          // Check if the browser is trying to run the raw source code (main.tsx) instead of the built app
          const isRawSource = document.documentElement.innerHTML.includes('src="/src/main.tsx"');
          
          let finalMsg = "Unknown render failure.";
          if (isRawSource) {
            finalMsg = "CONFIGURATION ERROR: You are serving the raw source code from the 'main' branch instead of the built app. Browsers cannot run raw React/TypeScript. Go to GitHub repository Settings -> Pages -> 'Build and deployment' -> Change 'Source' from 'Deploy from a branch' to 'GitHub Actions'.";
          } else if (debugLog.length > 0) {
            finalMsg = debugLog.join(" || ");
          } else if (!storageAvailable) {
            finalMsg = "Storage is blocked (Incognito mode?) and React failed to mount silently.";
          }

          showFallbackError(finalMsg);
        }
      }, 3000);

      function showFallbackError(msg) {
        const root = document.getElementById('root');
        if (root && root.innerHTML.trim() === '') {
          root.innerHTML = '<div style="padding: 20px; text-align: center; color: #f97316; font-family: sans-serif; max-width: 400px; margin: 40px auto; background: #fff3ed; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">' +
            '<h2 style="margin-top: 0;">App Failed to Load</h2>' +
            '<p style="color: #666; font-size: 14px;">Something went wrong while starting the app.</p>' +
            '<p style="font-size: 11px; color: #dc2626; word-break: break-all; background: #fee2e2; padding: 8px; border-radius: 4px;">Error: ' + msg + '</p>' +
            '<button onclick="forceClearAndReload()" style="margin-top: 20px; padding: 12px 24px; background-color: #f97316; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%;">Clear Cache & Reload</button>' +
            '</div>';
        }
      }

      window.forceClearAndReload = function() {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            for(let registration of registrations) {
              registration.unregister();
            }
          });
        }
        if ('caches' in window) {
          caches.keys().then(function(names) {
            for (let name of names) {
              caches.delete(name);
            }
          });
        }
        try {
          localStorage.clear();
          sessionStorage.clear();
        } catch(e) {}
        
        setTimeout(() => {
          window.location.reload(true);
        }, 500);
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // Append timestamp to force browser to fetch latest sw.js
          const swUrl = '%BASE_URL%sw.js?v=' + new Date().getTime();
          navigator.serviceWorker.register(swUrl).then(registration => {
            console.log('SW registered: ', registration);
          }).catch(registrationError => {
            console.log('SW registration failed: ', registrationError);
          });
        });
      }
    </script>
  </body>
</html>
